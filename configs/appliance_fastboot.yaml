build: full

runtime:
  mode: appliance_fastboot
  enable_validation: true

audio:
  channels: 8
  sample_rate_hz: 48000
  block_size: 1024

video:
  cameras:
    - id: cam0
      hfov_deg: 160
      yaw_offset_deg: 0
    - id: cam1
      hfov_deg: 160
      yaw_offset_deg: 120
    - id: cam2
      hfov_deg: 160
      yaw_offset_deg: 240

output:
  sink: usb_mic
  usb_mic:
    channels: 1
    device_selector:
      match_substring: USB

