build: full
runtime:
  run_id: ''
  fail_fast: true
  perf_profile: realtime_pi_max
  process_mode: multiprocess
  enable_validation: true
  realtime:
    enabled: true
    allow_best_effort: true
    scheduler: fifo
    priority: 8
    cpu_affinity:
    - 0
    mlockall: false
  multiprocess:
    start_method: spawn
    queue_depth: 24
    shared_memory: true
    workers:
      parent:
        cpu_affinity:
        - 0
        scheduler: rr
        priority: 2
      audio:
        cpu_affinity:
        - 2
        - 3
        scheduler: fifo
        priority: 10
      vision:
        cpu_affinity:
        - 1
        scheduler: rr
        priority: 4
  requirements:
    strict: true
    min_cameras: 3
    min_audio_channels: 8
    camera_scope: usb
  artifacts:
    dir: artifacts
    retention:
      max_runs: 10
trace:
  enabled: true
  level: medium
  thumbnails:
    enabled: false
    fps: 1
  record_raw_audio: false
  record_heatmap_full: false
health:
  enabled: true
  thresholds_ms:
    audio_frames: 200
    enhanced_final: 300
    face_tracks: 1000
    camera_frame: 1000
perf:
  enabled: true
  emit_hz: 1
bench:
  targets:
    si_sdr_delta_db_min: 2.0
    stoi_delta_min: 0.03
    wer_relative_improvement_min: 0.12
    sir_delta_db_min: 4.0
    latency_p95_ms_max: 150.0
    latency_p99_ms_max: 220.0
    audio_queue_full_max: 25
    audio_underrun_rate_max: 0.005
audio:
  channels: 8
  sample_rate_hz: 48000
  block_size: 2048
  device_profile: minidsp_uma8_raw_7p1
  capture:
    allow_mono_fallback: false
    publish_fft: true
    queue_depth: 64
    stats_emit_hz: 1
  mic_health:
    enabled: true
    min_active_score: 0.35
    min_coherence: 0.12
    max_drift_samples: 8
  device_selector:
    match_substring: miniDSP
    require_input_channels: 8
  vad:
    enabled: true
    backend: auto
    mode: 1
    frame_ms: 30
    min_speech_ratio: 0.3
  doa:
    method: srp_phat
    bins: 72
    update_hz: 10
  beamformer:
    method: mvdr
    no_lock_behavior: omni
    use_last_lock_ms: 800
    steering_smoothing_alpha: 0.85
    channel_weights:
      enabled: true
      spatial_exponent: 2.0
      dead_rms_threshold: 1.0e-05
      min_snr_db: 3.0
      max_snr_db: 18.0
      max_clip_fraction: 0.01
    health_fallback:
      min_active_score: 0.35
      mvdr_min_channels: 4
      uncertain_trust_threshold: 0.45
    noise_reference:
      ref_threshold: 0.2
      update_when_speaking: true
    mvdr:
      nfft: 1024
      refresh_ms: 250
      noise_ema_alpha: 0.95
      diagonal_loading: 0.001
      steering_update_deg: 5.0
      max_condition_number: 1.0e6
      weight_interp_alpha: 0.35
      speech_freeze_covariance: true
      freq_low_hz: 150
      freq_high_hz: 4600
      postfilter:
        enabled: true
        noise_ema_alpha: 0.97
        speech_ema_alpha: 0.9
        over_subtraction: 1.15
        min_gain: 0.08
  denoise:
    enabled: true
    backend: hybrid
    wiener:
      g_min: 0.05
      noise_ema_alpha: 0.98
    rnnoise:
      model_path: ''
      strength: 0.65
      min_gain: 0.08
      noise_ema_alpha: 0.98
      gain_ema_alpha: 0.85
      nfft: 1024
    hybrid:
      postfilter_strength: 0.5
  sync:
    enabled: true
    drift_check:
      max_offset_samples: 6
      check_every_s: 2.0
video:
  cameras:
  - id: cam0
    device_path: ''
    device_index: 0
    width: 640
    height: 360
    fps: 15
    hfov_deg: 160
    yaw_offset_deg: 0
    bearing_model: linear
    bearing_lut_path: ''
  - id: cam1
    device_path: ''
    device_index: 1
    width: 640
    height: 360
    fps: 15
    hfov_deg: 160
    yaw_offset_deg: 120
    bearing_model: linear
    bearing_lut_path: ''
  - id: cam2
    device_path: ''
    device_index: 2
    width: 640
    height: 360
    fps: 15
    hfov_deg: 160
    yaw_offset_deg: 240
    bearing_model: linear
    bearing_lut_path: ''
vision:
  face:
    backend: auto
    min_confidence: 0.6
    iou_threshold: 0.3
    max_missing_frames: 10
    min_area: 800
    min_neighbors: 6
    scale_factor: 1.15
    detect_width: 320
    detect_every_n: 2
  track:
    smoothing_alpha: 0.6
    max_missing_frames: 10
    min_age_frames: 2
  mouth:
    backend: auto
    smoothing_alpha: 0.7
    min_activity: 0.06
    max_activity: 0.2
    diff_threshold: 15
    use_facemesh: true
    mesh_every_n: 2
    mesh_max_faces: 3
    mesh_min_detection_confidence: 0.5
    mesh_min_tracking_confidence: 0.5
    mesh_min_activity: 0.005
    mesh_max_activity: 0.1
    mesh_model_path: ''
    tflite_model_path: ''
    tflite_model_member: face_landmarks_detector.tflite
    tflite_threads: 2
    tflite_min_presence: 0.0
    tflite_crop_scale: 1.45
  heatmap:
    bin_size_deg: 10
    sigma_deg: 18
    top_k_peaks: 2
    smoothing_alpha: 0.25
fusion:
  thresholds_preset: balanced
  weights:
    bias: -0.35
    mouth: 1.05
    face: 0.35
    doa: 1.15
    angle: 0.95
    audio: 1.05
    continuity: 0.55
    mic_health: 0.8
    doa_confidence: 0.75
    agreement_bonus: 0.4
  require_vad: false
  vad_max_age_ms: 500
  require_speaking: false
bus:
  max_queue_depth: 64
  topic_queue_depths:
    audio.frames: 32
    audio.vad: 64
    audio.enhanced.beamformed: 64
    audio.enhanced.final: 64
    vision.frames.*: 16
    vision.frames.cam0: 16
    vision.frames.cam1: 16
    vision.frames.cam2: 16
    vision.face_tracks: 16
    runtime.perf: 16
logging:
  level: info
  file:
    enabled: true
    flush_interval_ms: 200
    rotate_mb: 50
output:
  sink: file
  file_sink:
    dir: artifacts
    write_raw_multich: true
ui:
  host: 127.0.0.1
  port: 8080
  telemetry_hz: 10
