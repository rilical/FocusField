# Lock thresholds presets
aggressive:
  acquire_threshold: 0.55
  acquire_timeout_ms: 500
  hold_ms: 500
  handoff_min_ms: 400
  speak_on_threshold: 0.45
  speak_off_threshold: 0.35
  min_on_frames: 1
  min_off_frames: 2
  min_switch_interval_ms: 350
  bearing_smoothing_alpha: 0.6

hybrid_low_latency:
  acquire_threshold: 0.48
  acquire_timeout_ms: 500
  hold_ms: 450
  handoff_min_ms: 300
  drop_threshold: 0.30
  speak_on_threshold: 0.45
  speak_off_threshold: 0.35
  min_on_frames: 1
  min_off_frames: 2
  min_switch_interval_ms: 250
  bearing_smoothing_alpha: 0.55

balanced:
  acquire_threshold: 0.65
  acquire_timeout_ms: 500
  hold_ms: 800
  handoff_min_ms: 700
  speak_on_threshold: 0.5
  speak_off_threshold: 0.4
  min_on_frames: 2
  min_off_frames: 2
  min_switch_interval_ms: 500
  bearing_smoothing_alpha: 0.7

conservative:
  acquire_threshold: 0.75
  acquire_timeout_ms: 500
  hold_ms: 1200
  handoff_min_ms: 1000
  speak_on_threshold: 0.6
  speak_off_threshold: 0.5
  min_on_frames: 2
  min_off_frames: 2
  min_switch_interval_ms: 700
  bearing_smoothing_alpha: 0.8

mvdr_low_latency_reliable:
  acquire_threshold: 0.58
  acquire_timeout_ms: 450
  hold_ms: 450
  handoff_min_ms: 260
  drop_threshold: 0.32
  acquire_threshold_audio_only: 0.48
  drop_threshold_audio_only: 0.30
  hold_ms_audio_only: 320
  handoff_min_ms_audio_only: 220
  speak_on_threshold: 0.45
  speak_off_threshold: 0.35
  min_on_frames: 1
  min_off_frames: 2
  min_switch_interval_ms: 250
  bearing_smoothing_alpha: 0.60
  handoff_margin: 0.08
  interrupt_min_delta: 0.05
  interrupt_hold_ms: 250
