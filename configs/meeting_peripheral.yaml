build: full

runtime:
  mode: meeting_peripheral
  fail_fast: false
  enable_validation: true
  requirements:
    strict: false
    min_cameras: 3
    min_audio_channels: 8
    camera_scope: usb

audio:
  channels: 8
  sample_rate_hz: 48000
  block_size: 960
  device_profile: minidsp_uma8_raw_7p1
  capture:
    allow_mono_fallback: false
    queue_depth: 24
  device_selector:
    match_substring: miniDSP
    require_input_channels: 8
  models:
    allow_runtime_downloads: false

vision:
  models:
    allow_runtime_downloads: false
  face:
    backend: auto
    min_area: 120
    detect_width: 416
    detect_every_n: 1
  mouth:
    backend: tflite
    use_facemesh: true
    mesh_every_n: 1
    tflite_min_presence: 0.35

video:
  cameras:
    - id: cam0
      hfov_deg: 160
      yaw_offset_deg: 0
      width: 640
      height: 360
      fps: 15
    - id: cam1
      hfov_deg: 160
      yaw_offset_deg: 120
      width: 640
      height: 360
      fps: 15
    - id: cam2
      hfov_deg: 160
      yaw_offset_deg: 240
      width: 640
      height: 360
      fps: 15

output:
  sink: usb_mic
  usb_mic:
    channels: 1
    device_selector:
      match_substring: USB
