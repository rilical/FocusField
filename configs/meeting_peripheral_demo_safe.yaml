build: full

runtime:
  mode: meeting_peripheral
  fail_fast: false
  perf_profile: realtime_pi_max
  enable_validation: true
  requirements:
    strict: false
    min_cameras: 3
    min_audio_channels: 8
    camera_scope: usb

trace:
  enabled: true
  level: medium
  thumbnails:
    enabled: true
    fps: 1
  record_raw_audio: true
  record_heatmap_full: false

bench:
  targets:
    latency_p95_ms_max: 150.0
    latency_p99_ms_max: 220.0
    output_underrun_rate_max: 0.02
    queue_pressure_max: 25.0

audio:
  channels: 8
  sample_rate_hz: 48000
  block_size: 2048
  device_profile: minidsp_uma8_raw_7p1
  capture:
    allow_mono_fallback: false
    queue_depth: 16
    stats_emit_hz: 1
    reconnect_delay_ms: 750
    latency: high
  mic_health:
    enabled: false
  device_selector:
    match_substring: miniDSP
    require_input_channels: 8
  models:
    allow_runtime_downloads: false
  vad:
    enabled: true
    backend: webrtc
    mode: 1
    frame_ms: 30
    min_speech_ratio: 0.3
    update_hz: 4
  doa:
    method: srp_phat
    bins: 36
    update_hz: 4
    freq_low_hz: 200
    freq_high_hz: 4500
    continuity_weight: 0.18
    continuity_sigma_bins: 5.0
    max_jump_deg: 65.0

vision:
  models:
    allow_runtime_downloads: false
  face:
    backend: auto
    min_area: 120
    detect_width: 256
    detect_every_n: 2
  mouth:
    backend: diff
    use_facemesh: false
    mesh_every_n: 2

video:
  cameras:
    - id: cam0
      hfov_deg: 160
      yaw_offset_deg: 0
      width: 352
      height: 198
      fps: 6
    - id: cam1
      hfov_deg: 160
      yaw_offset_deg: 120
      width: 352
      height: 198
      fps: 6
    - id: cam2
      hfov_deg: 160
      yaw_offset_deg: 240
      width: 352
      height: 198
      fps: 6

fusion:
  thresholds_preset: ''
  visual_freshness_ms: 1200
  visual_override_min: 0.6
  audio_rescue_min: 0.35
  disagreement_penalty: 0.25
  weights:
    bias: -0.35
    mouth: 0.55
    face: 0.25
    continuity: 0.70
    mic_health: 0.0
    doa: 0.22
    doa_confidence: 0.35
    angle: 0.10
    audio: 0.35
    agreement_bonus: 0.25
  require_vad: false
  vad_max_age_ms: 500
  require_speaking: true
  audio_fallback:
    enabled: false
  thresholds:
    acquire_threshold: 0.24
    acquire_timeout_ms: 1200
    acquire_persist_ms: 250
    acquire_floor_ratio: 0.55
    drop_threshold: 0.12
    hold_ms: 2200
    handoff_min_ms: 2200
    min_switch_interval_ms: 1800
    speak_on_threshold: 0.14
    bearing_smoothing_alpha: 0.75

bus:
  max_queue_depth: 24
  topic_queue_depths:
    audio.frames: 16
    audio.vad: 16
    audio.doa_heatmap: 8
    audio.enhanced.beamformed: 12
    audio.enhanced.final: 12
    runtime.perf: 8
    vision.frames.*: 4
    vision.frames.cam0: 4
    vision.frames.cam1: 4
    vision.frames.cam2: 4
    vision.face_tracks: 4
    fusion.target_lock: 8

uma8_leds:
  enabled: false
  enabled_fallback: false
  strict_transport: false
  backend: none

ui:
  enabled: false
  telemetry_hz: 2
  frame_max_hz: 1

output:
  sink: usb_mic
  usb_mic:
    channels: 1
    reconnect_delay_ms: 750
    device_selector:
      match_substring: USB
