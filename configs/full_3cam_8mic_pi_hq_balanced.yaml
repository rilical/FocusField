build: full
runtime:
  run_id: ''
  fail_fast: true
  enable_validation: true
  requirements:
    strict: true
    min_cameras: 3
    min_audio_channels: 8
    camera_scope: usb
  artifacts:
    dir: artifacts
    retention:
      max_runs: 10
trace:
  enabled: false
  level: medium
  thumbnails:
    enabled: false
    fps: 1
  record_raw_audio: false
  record_heatmap_full: false
health:
  enabled: true
  thresholds_ms:
    audio_frames: 220
    enhanced_final: 300
    face_tracks: 1000
    camera_frame: 1000
perf:
  enabled: true
  emit_hz: 1
bench:
  targets:
    si_sdr_delta_db_min: 2.0
    stoi_delta_min: 0.03
    wer_relative_improvement_min: 0.12
    sir_delta_db_min: 4.0
    latency_p95_ms_max: 150.0
    latency_p99_ms_max: 220.0
    audio_queue_full_max: 25
    audio_underrun_rate_max: 0.005
audio:
  channels: 8
  sample_rate_hz: 48000
  block_size: 512
  device_profile: minidsp_uma8_raw_7p1
  capture:
    allow_mono_fallback: false
    queue_depth: 4
    stats_emit_hz: 1
  device_selector:
    match_substring: miniDSP
    require_input_channels: 8
  vad:
    enabled: true
    mode: 1
    frame_ms: 30
    min_speech_ratio: 0.3
  doa:
    method: srp_phat
    bins: 24
    update_hz: 4
    freq_low_hz: 200
    freq_high_hz: 4500
    continuity_weight: 0.18
    continuity_sigma_bins: 5.0
    max_jump_deg: 65.0
  beamformer:
    method: delay_and_sum
    no_lock_behavior: omni
    use_last_lock_ms: 800
    steering_smoothing_alpha: 0.85
    channel_weights:
      enabled: true
      spatial_exponent: 2.0
      dead_rms_threshold: 1.0e-05
      min_snr_db: 3.0
      max_snr_db: 18.0
      max_clip_fraction: 0.01
    noise_reference:
      ref_threshold: 0.2
      update_when_speaking: true
    mvdr:
      nfft: 2048
      refresh_ms: 250
      noise_ema_alpha: 0.95
      diagonal_loading: 0.001
      steering_update_deg: 5.0
      max_condition_number: 1.0e6
      weight_interp_alpha: 0.35
      speech_freeze_covariance: true
      freq_low_hz: 150
      freq_high_hz: 4600
      postfilter:
        enabled: true
        noise_ema_alpha: 0.97
        speech_ema_alpha: 0.9
        over_subtraction: 1.15
        min_gain: 0.08
  denoise:
    enabled: false
    backend: hybrid
    wiener:
      g_min: 0.05
      noise_ema_alpha: 0.98
      nfft: 2048
    rnnoise:
      model_path: ''
      strength: 0.6
      min_gain: 0.08
      noise_ema_alpha: 0.98
      gain_ema_alpha: 0.88
      nfft: 2048
    hybrid:
      postfilter_strength: 0.5
  sync:
    enabled: true
    drift_check:
      max_offset_samples: 6
      check_every_s: 2.0
video:
  cameras:
  - id: cam0
    device_path: /dev/v4l/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.2:1.0-video-index0
    device_index: 0
    width: 480
    height: 270
    fps: 10
    hfov_deg: 160
    yaw_offset_deg: 0
    bearing_model: linear
    bearing_lut_path: ''
  - id: cam1
    device_path: /dev/v4l/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.1:1.0-video-index0
    device_index: 1
    width: 480
    height: 270
    fps: 10
    hfov_deg: 160
    yaw_offset_deg: 120
    bearing_model: linear
    bearing_lut_path: ''
  - id: cam2
    device_path: /dev/v4l/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.4:1.0-video-index0
    device_index: 2
    width: 480
    height: 270
    fps: 10
    hfov_deg: 160
    yaw_offset_deg: 240
    bearing_model: linear
    bearing_lut_path: ''
vision:
  face:
    min_confidence: 0.6
    iou_threshold: 0.3
    max_missing_frames: 10
    min_area: 520
    min_neighbors: 3
    scale_factor: 1.1
    detect_width: 320
    detect_every_n: 1
  track:
    smoothing_alpha: 0.6
    max_missing_frames: 10
    min_age_frames: 2
  mouth:
    smoothing_alpha: 0.5
    min_activity: 0.02
    max_activity: 0.2
    diff_threshold: 4
    use_facemesh: false
    mesh_every_n: 2
    mesh_max_faces: 3
    mesh_min_detection_confidence: 0.5
    mesh_min_tracking_confidence: 0.5
    mesh_min_activity: 0.005
    mesh_max_activity: 0.1
    mesh_model_path: ''
  heatmap:
    bin_size_deg: 10
    sigma_deg: 18
    top_k_peaks: 2
    smoothing_alpha: 0.25
fusion:
  thresholds_preset: aggressive
  require_vad: false
  vad_max_age_ms: 500
  require_speaking: false
bus:
  max_queue_depth: 24
  topic_queue_depths:
    audio.frames: 16
    audio.vad: 32
    audio.enhanced.beamformed: 16
    audio.enhanced.final: 16
    runtime.perf: 8
    vision.frames.*: 8
    vision.frames.cam0: 8
    vision.frames.cam1: 8
    vision.frames.cam2: 8
    vision.face_tracks: 4
    fusion.target_lock: 16
logging:
  level: warning
  file:
    enabled: false
    flush_interval_ms: 200
    rotate_mb: 50
output:
  sink: none
  file_sink:
    dir: artifacts
    write_raw_multich: true
uma8_leds:
  enabled: true
  enabled_fallback: true
  backend: hid
  doa_fallback_enabled: true
  doa_min_confidence: 0.05
  doa_use_without_vad: false
  ring_size: 12
  update_hz: 12
  base_bearing_offset_deg: 0.0
  idle_rgb:
  - 32
  - 32
  - 96
  lock_rgb:
  - 0
  - 255
  - 128
  search_rgb:
  - 0
  - 140
  - 255
  smoothing_alpha: 0.35
  brightness_min: 0.2
  brightness_max: 0.85
  vendor_id: 10066
  product_id: 28
ui:
  host: 0.0.0.0
  port: 8080
  telemetry_hz: 8
